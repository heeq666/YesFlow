<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark background circle -->
  <circle cx="16" cy="16" r="15" fill="#1a0a2e"/>
  <!-- Purple ring border -->
  <circle cx="16" cy="16" r="14" stroke="url(#g)" stroke-width="1.5" fill="none"/>
  <!-- Four dots at cardinal positions (orchestra nodes) -->
  <circle cx="16" cy="5" r="2.5" fill="#a855f7"/>
  <circle cx="27" cy="16" r="2.5" fill="#06b6d4"/>
  <circle cx="16" cy="27" r="2.5" fill="#a855f7"/>
  <circle cx="5" cy="16" r="2.5" fill="#06b6d4"/>
  <!-- Connecting lines through center -->
  <line x1="16" y1="5" x2="16" y2="27" stroke="#a855f7" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="5" y1="16" x2="27" y2="16" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.4"/>
  <!-- Center AI dot -->
  <circle cx="16" cy="16" r="3.5" fill="#7c3aed"/>
  <circle cx="16" cy="16" r="2" fill="#c084fc"/>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="32" y2="32">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
</svg>
